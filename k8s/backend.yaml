apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: lucaslatessa/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: "mysql-service"
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "bypass"
        - name: DB_USER
          value: "django_user"
        - name: DB_PASSWORD
          value: "django_pass"
        - name: CLIENT_ORIGIN_URL
          value: "https://www.unlucoin.info"
        - name: BACKEND_ORIGIN_URL
          value: "https://api.unlucoin.info" # <--- ¡CAMBIO CLAVE AQUÍ! Nuevo dominio público para tu API
        - name: AUTH0_DOMAIN
          value: "dev-tkm11ny0scl8iufa.us.auth0.com"
        - name: AUTH0_API_IDENTIFIER
          value: "https://bypassAPI.com"
        # --- ¡RECOMENDADO: Mover estos secretos a un Kubernetes Secret! ---
        # No poner valores sensibles directamente en el archivo YAML de Deployment.
        # Aquí te muestro cómo se vería si ya tuvieras un Secret llamado 'backend-secrets'
        # con las claves 'DJANGO_SECRET_KEY' y 'PROD_ACCESS_TOKEN'.
        # Para crear el Secret, ejecuta:
        # kubectl create secret generic backend-secrets \
        #   --from-literal=DJANGO_SECRET_KEY="tu-super-clave-secreta-de-django" \
        #   --from-literal=PROD_ACCESS_TOKEN="tu-token-de-mercadopago-produccion"
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: DJANGO_SECRET_KEY
        - name: PROD_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: PROD_ACCESS_TOKEN
        # --- FIN de la recomendación de Secretos ---
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  # Elimina esta anotación, ya no es un LoadBalancer interno.
  # networking.gke.io/load-balancer-type: "Internal"
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP # <--- ¡CAMBIO CLAVE AQUÍ! Ahora es un servicio interno