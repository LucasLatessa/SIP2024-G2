apiVersion: v1
kind: Namespace
metadata:
  name: ingress-nginx
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  chart: ingress-nginx
  repo: https://kubernetes.github.io/ingress-nginx
  targetNamespace: ingress-nginx
  version: 4.10.1
  valuesContent: |-
    controller:
      service:
        loadBalancerIP: frontend-static-ip
        annotations:
          networking.gke.io/load-balancer-type: "External"
