      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set KUBECONFIG from secret
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy backend to Kubernetes
        run: kubectl apply -f k8s-backend.yaml

      - name: Deploy frontend to Kubernetes
        run: kubectl apply -f k8s-frontend.yaml
name: Build and Deploy to GKE

on:
  push:
    branches: [ despliegue ]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GAR_LOCATION: us-central1
      BACKEND_IMAGE: ${{ secrets.GCP_PROJECT_ID }}/backend:latest
      FRONTEND_IMAGE: ${{ secrets.GCP_PROJECT_ID }}/frontend:latest
      CLUSTER_NAME: gke-cluster
      CLUSTER_REGION: us-central1
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        export_default_credentials: true

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker $GAR_LOCATION-docker.pkg.dev

    - name: Build and push backend image
      run: |
        docker build -t $GAR_LOCATION-docker.pkg.dev/$BACKEND_IMAGE ./backend-djangoAPI
        docker push $GAR_LOCATION-docker.pkg.dev/$BACKEND_IMAGE

    - name: Build and push frontend image
      run: |
        docker build -t $GAR_LOCATION-docker.pkg.dev/$FRONTEND_IMAGE ./frontend
        docker push $GAR_LOCATION-docker.pkg.dev/$FRONTEND_IMAGE

    - name: Get GKE credentials
      run: |
        gcloud container clusters get-credentials $CLUSTER_NAME --region $CLUSTER_REGION

    - name: Deploy backend to GKE
      run: |
        kubectl set image deployment/backend backend=$GAR_LOCATION-docker.pkg.dev/$BACKEND_IMAGE --record || kubectl apply -f k8s-backend.yaml

    - name: Deploy frontend to GKE
      run: |
        kubectl set image deployment/frontend frontend=$GAR_LOCATION-docker.pkg.dev/$FRONTEND_IMAGE --record || kubectl apply -f k8s-frontend.yaml

name: Build and Push Docker Images to Docker Hub

on:
  push:
    branches: [ despliegue ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-djangoAPI
          push: true
          tags: enzobianchi8/backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: enzobianchi8/frontend:latest
